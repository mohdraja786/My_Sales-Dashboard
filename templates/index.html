<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>मेरा सेल्स डैशबोर्ड</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* डार्क मोड की स्पेशल स्टाइलिंग */
        body.dark-mode {
            background-color: #121212 !important;
            color: #ffffff !important;
        }
        body.dark-mode .bg-white {
            background-color: #1e1e1e !important;
            color: #ffffff !important;
        }
        body.dark-mode .text-dark {
            color: #ffffff !important;
        }
        body.dark-mode .text-muted {
            color: #b0b0b0 !important;
        }
        body.dark-mode .table {
            color: #ffffff !important;
            border-color: #444444 !important;
        }
        body.dark-mode .table-striped>tbody>tr:nth-of-type(odd)>* {
            --bs-table-color-type: #ffffff !important;
            --bs-table-bg-type: #2a2a2a !important;
        }
        body.dark-mode .form-select, body.dark-mode .form-control {
            background-color: #2a2a2a !important;
            color: #ffffff !important;
            border-color: #444444 !important;
        }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <!-- डार्क मोड बटन और हेडिंग एक ही लाइन में -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-primary mb-0">Sales Dashboard</h1>
        <button id="themeToggle" class="btn btn-outline-dark btn-sm fw-bold">🌙 Dark Mode</button>
    </div>

    {% if error %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <strong>सॉरी!</strong> {{ error }}
    </div>
    {% endif %}

    <!-- फाइल अपलोड करने का फॉर्म -->
    <div class="bg-white p-4 rounded shadow-sm mb-4">
        <form action="/" method="POST" enctype="multipart/form-data">
            <label class="form-label fw-bold">अपनी CSV या Excel फ़ाइल अपलोड करें:</label>
            <div class="input-group">
                <input type="file" name="file" class="form-control" accept=".csv, .xlsx, .xls" required>
                <button type="submit" class="btn btn-success px-4">Upload</button>
            </div>
        </form>
    </div>

    <!-- Stats बॉक्स -->
    <div class="row text-center mb-4">
        <div class="col-md-6 mb-2">
            <div class="bg-white p-3 rounded shadow-sm border-start border-primary border-4">
                <h5 class="text-muted">कुल योग (Age)</h5>
                <h3 class="fw-bold text-dark">{{ total }}</h3>
            </div>
        </div>
        <div class="col-md-6 mb-2">
            <div class="bg-white p-3 rounded shadow-sm border-start border-success border-4">
                <h5 class="text-muted">सबसे बड़ी सिटी (City)</h5>
                <h3 class="fw-bold text-dark">{{ best }}</h3>
            </div>
        </div>
    </div>

    <!-- चार्ट और ड्रॉपडाउन -->
    <div class="bg-white p-4 rounded shadow-sm mb-5">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="text-secondary mb-0">डेटा विज़ुअलाइज़ेशन</h4>
            <div class="d-flex align-items-center">
                <label class="me-2 fw-bold text-muted small">चार्ट का प्रकार:</label>
                <select id="chartType" class="form-select form-select-sm" style="width: 150px;">
                    <option value="bar">Bar (बार)</option>
                    <option value="line">Line (लाइन)</option>
                    <option value="pie">Pie (पाई)</option>
                </select>
            </div>
        </div>
        <canvas id="myChart" width="400" height="150"></canvas>
    </div>

    <!-- डेटा टेबल -->
    <div class="bg-white p-4 rounded shadow-sm mb-5">
        <h4 class="mb-3 text-secondary">डेटा टेबल</h4>
        <div class="table-responsive">
            {{ table | safe }}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // --- थीम बदलने का जावास्क्रिप्ट लॉजिक ---
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        
        if (document.body.classList.contains('dark-mode')) {
            themeToggle.innerText = '☀️ Light Mode';
            themeToggle.classList.replace('btn-outline-dark', 'btn-outline-light');
            
            // चार्ट का टेक्स्ट भी डार्क मोड में सफेद करने के लिए
            myChart.options.scales.x.grid.color = '#444444';
            myChart.options.scales.y.grid.color = '#444444';
            myChart.update();
        } else {
            themeToggle.innerText = '🌙 Dark Mode';
            themeToggle.classList.replace('btn-outline-light', 'btn-outline-dark');
            
            myChart.options.scales.x.grid.color = '#efefef';
            myChart.options.scales.y.grid.color = '#efefef';
            myChart.update();
        }
    });

    // --- चार्ट का लॉजिक ---
    const ctx = document.getElementById('myChart').getContext('2d');
    
    const chartData = {
        labels: {{ labels | safe }},
        datasets: [{
            label: 'Age by City',
            data: {{ values | safe }},
            backgroundColor: [
                'rgba(54, 162, 235, 0.6)',
                'rgba(255, 99, 132, 0.6)',
                'rgba(75, 192, 192, 0.6)',
                'rgba(255, 206, 86, 0.6)'
            ],
            borderColor: [
                'rgba(54, 162, 235, 1)',
                'rgba(255, 99, 132, 1)',
                'rgba(75, 192, 192, 1)',
                'rgba(255, 206, 86, 1)'
            ],
            borderWidth: 1
        }]
    };

    let myChart = new Chart(ctx, {
        type: 'bar',
        data: chartData,
        options: {
            responsive: true,
            scales: {
                y: { beginAtZero: true }
            }
        }
    });

    document.getElementById('chartType').addEventListener('change', function() {
        const selectedType = this.value;
        myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: selectedType,
            data: chartData,
            options: {
                responsive: true,
                scales: (selectedType === 'pie') ? {} : {
                    y: { beginAtZero: true }
                }
            }
        });
    });
</script>

</body>
</html>
