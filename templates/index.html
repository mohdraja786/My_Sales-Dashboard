<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>मेरा सेल्स डैशबोर्ड</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h1 class="mb-4 text-center text-primary">Sales Dashboard</h1>

    <div class="bg-white p-4 rounded shadow-sm mb-4">
        <form action="/" method="POST" enctype="multipart/form-data">
            <label class="form-label fw-bold">अपनी CSV या Excel फ़ाइल अपलोड करें:</label>
            <div class="input-group">
                <input type="file" name="file" class="form-control" accept=".csv, .xlsx, .xls" required>
                <button type="submit" class="btn btn-success px-4">Upload</button>
            </div>
        </form>
    </div>

    <div class="row text-center mb-4">
        <div class="col-md-6 mb-2">
            <div class="bg-white p-3 rounded shadow-sm border-start border-primary border-4">
                <h5 class="text-muted">कुल योग (Age)</h5>
                <h3 class="fw-bold text-dark">{{ total }}</h3>
            </div>
        </div>
        <div class="col-md-6 mb-2">
            <div class="bg-white p-3 rounded shadow-sm border-start border-success border-4">
                <h5 class="text-muted">सबसे बड़ी सिटी (City)</h5>
                <h3 class="fw-bold text-dark">{{ best }}</h3>
            </div>
        </div>
    </div>

    <div class="bg-white p-4 rounded shadow-sm mb-5">
        <canvas id="myChart" width="400" height="150"></canvas>
    </div>

    <div class="bg-white p-4 rounded shadow-sm mb-5">
        <h4 class="mb-3 text-secondary">डेटा टेबल</h4>
        <div class="table-responsive">
            {{ table | safe }}
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const ctx = document.getElementById('myChart').getContext('2d');
    const myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: {{ labels | safe }},
            datasets: [{
                label: 'Age by City',
                data: {{ values | safe }},
                backgroundColor: 'rgba(54, 162, 235, 0.6)',
                borderColor: 'rgba(54, 162, 235, 1)',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</body>
</html>
